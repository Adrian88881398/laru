<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos DelFrio - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Michroma&family=MuseoModerno:wght@400;700&family=Rubik:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(circle at top right, #082f49 0%, #020617 40%), radial-gradient(circle at bottom left, #0f172a 0%, #020617 40%);
            background-attachment: fixed;
            color: #f8fafc;
            overscroll-behavior-y: none;
        }

        .font-title {
            font-family: 'Michroma', sans-serif;
        }

        .font-slogan {
            font-family: 'MuseoModerno', sans-serif;
        }

        /* --- Utilidades Glassmorphism --- */
        .glass-panel {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- Acordeón --- */
        .accordion-header {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .accordion-header:hover {
            background-color: rgba(56, 189, 248, 0.05);
        }

        .accordion-header.open {
            background-color: rgba(6, 182, 212, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.5s ease;
            padding: 0 1.5rem;
            will-change: max-height;
        }

        .accordion-content.open {
            max-height: 9000px;
            padding: 1.5rem 1.5rem;
        }

        .accordion-arrow {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-180deg);
        }

        .accordion-header.open .accordion-arrow {
            transform: rotate(0deg);
        }

        /* --- 🫧 Burbujas Realistas 🫧 --- */
        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: radial-gradient(150% 150% at 30% 30%, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 40%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                inset 0 0 20px rgba(34, 211, 238, 0.15),
                0 0 10px rgba(6, 182, 212, 0.1);
            opacity: 0;
            pointer-events: none;
            will-change: transform, opacity;
            animation: floatUp 15s linear infinite, sway 4s ease-in-out infinite alternate;
        }

        @keyframes floatUp {
            0% {
                bottom: -10vh;
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                bottom: 120vh;
                opacity: 0;
            }
        }

        @keyframes sway {
            0% {
                transform: translateX(-20px) scale(0.95);
            }

            100% {
                transform: translateX(20px) scale(1.05);
            }
        }

        .bubble:nth-child(1) {
            left: 10%;
            animation-duration: 22s, 3s;
            animation-delay: 0s, 0s;
            width: 45px;
            height: 45px;
        }

        .bubble:nth-child(2) {
            left: 25%;
            animation-duration: 17s, 4s;
            animation-delay: 2s, 1s;
            width: 25px;
            height: 25px;
        }

        .bubble:nth-child(3) {
            left: 45%;
            animation-duration: 25s, 5s;
            animation-delay: 5s, 2s;
            width: 60px;
            height: 60px;
        }

        .bubble:nth-child(4) {
            left: 65%;
            animation-duration: 19s, 3.5s;
            animation-delay: 1s, 0.5s;
            width: 30px;
            height: 30px;
        }

        .bubble:nth-child(5) {
            left: 85%;
            animation-duration: 28s, 4.5s;
            animation-delay: 3s, 1.5s;
            width: 50px;
            height: 50px;
        }

        /* --- Inputs UX --- */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number],
        input[type=search],
        input[type=text] {
            -moz-appearance: textfield;
            appearance: textfield;
            color-scheme: dark;
        }

        .select-all-on-click {
            cursor: text;
        }

        details>summary::-webkit-details-marker {
            display: none;
        }

        /* Scrollbar Aqua */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #0891b2;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #06b6d4;
        }

        /* Botones Neón */
        .btn-liquid {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
        }

        .btn-liquid:hover {
            background: linear-gradient(135deg, #22d3ee 0%, #60a5fa 100%);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.5), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
        }

        /* MEJORA UX MASTER: 
           mix-blend-screen hace que el fondo negro/oscuro del png desaparezca mágicamente 
        */
        .blend-logo {
            mix-blend-mode: screen;
        }
    </style>
</head>

<body class="text-slate-200">

    <div id="bubble-container" class="fixed inset-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- PANTALLA DE LOGIN (Optimizada para Vertical Perfecta) -->
    <div id="loginScreen"
        class="flex items-center justify-center min-h-screen relative z-10 transition-all duration-500 ease-out py-6">

        <!-- Max-w-sm fuerza la orientación vertical elegante incluso en PC -->
        <div class="w-full max-w-sm p-6 sm:p-8 m-4 glass-panel rounded-[2rem] relative z-10 border border-white/5">
            <div class="text-center">
                <!-- Logo Login: Cero bordes, fondo invisible con blend-logo -->
                <div class="w-72 sm:w-44 h-auto mx-auto mb-4 flex items-center justify-center">
                    <img src="./img/logo-login.png" alt="Logo DelFrio" class="w-full h-auto blend-logo">
                </div>
                <h1 class="text-3xl font-title text-white leading-tight">Productos</h1>
                <h1 class="text-3xl font-title text-cyan-400 mt-0 leading-tight"
                    style="text-shadow: 0 0 15px rgba(6, 182, 212, 0.5);">DelFrio</h1>
                <p class="mt-2 text-[9px] sm:text-[10px] text-cyan-200/70 tracking-[0.25em] font-medium uppercase">
                    Catálogo Virtual Premium</p>
            </div>

            <div class="mt-8">
                <label for="customerName"
                    class="block text-[11px] font-bold text-cyan-500/80 ml-1 mb-2 uppercase tracking-wider">¿Cómo te
                    llamas?</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-cyan-500/50" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input type="text" id="customerName"
                        class="block w-full pl-12 pr-4 py-3.5 bg-slate-900/60 border border-slate-700/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:bg-slate-900 transition-all text-white placeholder-slate-500 shadow-inner"
                        placeholder="Escribe tu nombre aquí...">
                </div>
                <p id="nameError" class="mt-2 text-xs text-red-400 hidden pl-1">Por favor, ingresa tu nombre.</p>
                <button type="button" id="loginButton"
                    class="mt-6 w-full btn-liquid text-white font-bold py-3.5 px-4 rounded-xl transition-all duration-300 transform active:scale-95 flex items-center justify-center">
                    Entrar al Catálogo
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- PANTALLA DE LA APP -->
    <div id="appScreen" class="hidden min-h-screen relative z-10 transition-opacity duration-700 ease-in opacity-0">

        <!-- HEADER MAESTRO -->
        <header class="sticky top-0 z-30 glass-panel border-b border-white/5 shadow-lg shadow-cyan-900/20">
            <div class="container mx-auto px-4 py-3 sm:py-4">
                <div class="flex justify-between items-center gap-3 md:gap-6">

                    <!-- Logo Header: Más grande, sin bordes feos (blend-logo) -->
                    <div class="flex-shrink-0 flex items-center">
                        <img src="./img/logo-panel.png" alt="DelFrio"
                            class="h-20 sm:h-22 md:h-[4.5rem] w-auto object-contain blend-logo">
                    </div>

                    <!-- Buscador Desktop (Llama la atención y llena el panel) -->
                    <div class="hidden md:block flex-1 max-w-xl relative group">
                        <input type="search" id="searchInputDesktop"
                            placeholder="Buscar producto (ej. Cloro, Escoba...)"
                            class="w-full px-5 py-3 pl-12 bg-slate-900/60 border border-white/5 rounded-full focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:bg-slate-800/80 transition-all text-white placeholder-slate-400 shadow-inner text-sm">
                        <svg class="w-5 h-5 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2 group-focus-within:text-cyan-400 transition-colors"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                        </svg>
                    </div>

                    <!-- Acciones Usuario -->
                    <div class="flex items-center space-x-3 sm:space-x-5 flex-shrink-0">
                        <div class="hidden sm:flex flex-col items-end justify-center">
                            <span id="headerGreeting" class="text-sm font-bold text-white leading-tight"></span>
                            <button type="button" id="logoutButton"
                                class="text-[10px] font-medium text-slate-400 hover:text-cyan-400 transition-colors uppercase tracking-widest mt-0.5">Cambiar
                                Usuario</button>
                        </div>

                        <button type="button" id="cartButtonHeader"
                            class="relative p-2.5 sm:p-3 rounded-full bg-slate-800/50 hover:bg-slate-700/80 border border-slate-600/50 transition-all group active:scale-95 shadow-inner">
                            <svg xmlns="http://www.w3.org/2000/svg"
                                class="h-6 w-6 sm:h-7 sm:w-7 text-slate-300 group-hover:text-cyan-400 transition-colors"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                            </svg>
                            <span id="cartCountHeader"
                                class="absolute -top-1 -right-1 btn-liquid text-white text-[10px] sm:text-xs font-bold rounded-full h-5 w-5 sm:h-6 sm:w-6 flex items-center justify-center transform scale-0 transition-transform duration-300 border border-cyan-300/30 shadow-[0_0_8px_rgba(6,182,212,0.5)]">0</span>
                        </button>
                    </div>
                </div>

                <!-- Buscador Móvil (Aparece abajo del header solo en pantallas pequeñas) -->
                <div class="md:hidden mt-4 relative group">
                    <input type="search" id="searchInputMobile" placeholder="Buscar producto..."
                        class="w-full px-4 py-2.5 pl-10 bg-slate-900/60 border border-white/5 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-400 transition-all text-white placeholder-slate-400 shadow-inner text-sm">
                    <svg class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 group-focus-within:text-cyan-400 transition-colors"
                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </div>
            </div>
        </header>

        <main class="container mx-auto p-4 pb-32 relative z-10 max-w-5xl">

            <div class="mt-2 mb-6 sm:hidden border-l-4 border-cyan-400 pl-4 glass-card p-3 rounded-r-xl shadow-md">
                <p id="mobileGreeting" class="text-slate-200 text-sm font-medium"></p>
            </div>

            <div id="productListContainer" class="space-y-4 sm:space-y-6 md:mt-6">
                <!-- Productos dinámicos -->
            </div>
        </main>

        <!-- Botón Flotante del Carrito -->
        <button type="button" id="cartButtonFloating"
            class="md:hidden fixed bottom-6 right-6 z-30 btn-liquid text-white p-4 rounded-full hover:scale-105 active:scale-95 transition-all border border-cyan-300/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <span id="cartCountFloating"
                class="absolute top-0 right-0 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-slate-900 scale-0 transition-transform duration-300 shadow-sm">0</span>
        </button>

        <!-- Botón Logout Móvil -->
        <button type="button" id="logoutButtonMobile"
            class="md:hidden fixed bottom-6 left-6 z-30 glass-card text-slate-300 p-3.5 rounded-full shadow-lg active:scale-95 hover:text-cyan-400 hover:bg-slate-800/80 transition-all border border-slate-600/50"
            title="Cambiar Usuario">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
        </button>
    </div>

    <!-- MODAL DEL CARRITO (Glassmorphism) -->
    <div id="cartModal"
        class="fixed inset-0 z-50 flex items-center justify-center hidden bg-black/60 backdrop-blur-md transition-opacity duration-300 ease-out opacity-0">
        <div
            class="cart-modal-box flex flex-col w-full max-w-lg glass-panel sm:rounded-[2rem] shadow-[0_0_50px_rgba(6,182,212,0.15)] h-full sm:h-[90vh] sm:max-h-[850px] overflow-hidden transition-transform duration-300 ease-out translate-y-full sm:translate-y-0 sm:scale-95 border border-white/10">

            <div class="flex items-center justify-between p-5 border-b border-white/10 z-10 bg-slate-900/40">
                <h3 class="text-xl font-bold text-white flex items-center font-slogan">
                    <span
                        class="bg-cyan-900/30 text-cyan-400 p-2 rounded-xl mr-3 border border-cyan-500/20 shadow-[inset_0_0_10px_rgba(6,182,212,0.2)]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                    </span>
                    Tu Pedido
                </h3>
                <div class="flex items-center space-x-3">
                    <button type="button" id="initClearCartBtn"
                        class="text-slate-400 hover:text-rose-400 text-sm font-medium p-2 rounded-full hover:bg-rose-500/10 active:scale-90 transition-all"
                        title="Vaciar todo">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 pointer-events-none" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                    <button type="button" id="closeCartButton"
                        class="text-slate-400 hover:text-white p-2 bg-slate-800/50 border border-slate-700/50 rounded-full active:scale-90 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 pointer-events-none" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="cartItemsContainer" class="flex-1 p-5 overflow-y-auto space-y-4">
                <!-- Items del carrito -->
            </div>

            <div class="p-5 border-t border-white/10 z-10 bg-slate-900/60 backdrop-blur-lg">

                <div class="flex justify-between items-end mb-5">
                    <span class="text-sm font-medium text-cyan-200/70 uppercase tracking-wider">Subtotal Neto</span>
                    <span id="cartTotal" class="text-3xl font-bold text-cyan-400"
                        style="text-shadow: 0 0 15px rgba(6,182,212,0.4);">$0.00</span>
                </div>

                <div class="mb-5">
                    <p class="text-xs font-bold text-cyan-500/80 uppercase tracking-widest mb-3">Método de entrega</p>
                    <div class="grid grid-cols-1 gap-2">
                        <label
                            class="flex items-center p-3 glass-card rounded-2xl cursor-pointer hover:bg-slate-800/80 transition-colors has-[:checked]:border-cyan-500 has-[:checked]:bg-cyan-900/20 has-[:checked]:shadow-[inset_0_0_15px_rgba(6,182,212,0.1)]">
                            <input type="radio" name="deliveryMethod" value="domicilio"
                                class="w-4 h-4 text-cyan-500 focus:ring-cyan-500 border-slate-600 bg-slate-900" checked>
                            <span class="ml-3 text-sm font-medium text-slate-200">Envío a domicilio <span
                                    class="text-[11px] font-normal text-slate-400 block mt-0.5">Revisar costos en la
                                    política arriba</span></span>
                        </label>
                        <label
                            class="flex items-center p-3 glass-card rounded-2xl cursor-pointer hover:bg-slate-800/80 transition-colors has-[:checked]:border-cyan-500 has-[:checked]:bg-cyan-900/20 has-[:checked]:shadow-[inset_0_0_15px_rgba(6,182,212,0.1)]">
                            <input type="radio" name="deliveryMethod" value="recoger"
                                class="w-4 h-4 text-cyan-500 focus:ring-cyan-500 border-slate-600 bg-slate-900">
                            <span class="ml-3 text-sm font-medium text-slate-200">Pasaré a recogerlo al local <span
                                    class="text-[11px] font-bold text-teal-400 block mt-0.5">¡Sin costo
                                    extra!</span></span>
                        </label>
                    </div>
                </div>

                <button type="button" id="checkoutButton"
                    class="w-full btn-liquid text-white font-bold py-4 px-4 rounded-2xl transition-all active:scale-[0.98]">
                    Enviar pedido por WhatsApp

                    class="hidden w-full text-center bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-bold py-4 px-4 rounded-2xl shadow-[0_4px_15px_rgba(16,185,129,0.4)] hover:from-teal-500 hover:to-emerald-600 transition-all active:scale-[0.98]">
                    Confirmar en WhatsApp
                </a>
                <button type="button" id="cancelCheckoutButton"
                    class="hidden w-full bg-slate-800/50 border border-slate-700/50 text-slate-300 font-bold py-3 px-4 rounded-2xl mt-3 hover:bg-slate-700/80 transition-all">
                    Volver atrás
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Vaciar Carrito -->
    <div id="clearCartConfirmModal"
        class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/70 backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div
            class="glass-panel rounded-[2rem] p-6 max-w-sm w-11/12 text-center shadow-2xl transform scale-95 transition-transform duration-300 border-rose-500/20">
            <div
                class="w-16 h-16 bg-rose-500/10 text-rose-400 border border-rose-500/30 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[inset_0_0_15px_rgba(244,63,94,0.2)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-white mb-2">¿Vaciar carrito?</h3>
            <p class="text-slate-300 text-sm mb-6">Se eliminarán todos los productos de tu pedido actual. Esta acción no
                se puede deshacer.</p>
            <div class="flex gap-3">
                <button type="button" id="cancelClearBtn"

                        </details>

                        <!-- Formas de pago -->
                        <details class="group bg-cyan-900/10 border border-cyan-500/20 rounded-2xl overflow-hidden shadow-[inset_0_0_15px_rgba(6,182,212,0.05)]">
                            <summary class="flex justify-between items-center p-4 font-bold text-cyan-300 text-base cursor-pointer list-none hover:bg-cyan-900/20 transition-colors outline-none select-none">
                                <span class="flex items-center">💳 Formas de pago aceptadas:✅</span>
                                <span class="transition group-open:rotate-180 text-cyan-500">
                                    <svg fill="none" height="24" shape-rendering="geometricPrecision" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewBox="0 0 24 24" width="24"><path d="M6 9l6 6 6-6"></path></svg>
                                </span>
                            </summary>
                            <div class="p-4 pt-0 border-t border-cyan-500/10 mt-1 bg-slate-900/30">
                                <ul class="list-disc list-inside text-sm text-slate-200 space-y-3 mt-3">
                                    <li class="font-medium">
                                        Efectivo 💵🪙 <span class="font-normal text-slate-400">(al momento de la entrega, favor de avisar si requiere cambio)</span>
                                    </li>
                                    <li class="font-medium">
                                        Transferencia Bancaria: 📲💸
                                        <ul class="list-none pl-6 text-sm text-slate-300 mt-2 space-y-1 font-normal bg-slate-900/60 p-3 rounded-xl border border-white/5 shadow-inner">
                                            <li><strong class="text-cyan-400">Banco:</strong> Nu México</li>
                                            <li><strong class="text-cyan-400">Nombre:</strong> Francisco Javier Rayón Ugalde</li>
                                            <li><strong class="text-cyan-400">CLABE:</strong> 638 180 01010401064 7</li>
                                            <li><strong class="text-cyan-400">Concepto:</strong> "TU NOMBRE DE CLIENTE"</li>
                                        </ul>
                                    </li>
                                </ul>
                                <p class="text-[13px] text-cyan-400 mt-4 italic font-medium">Por favor, envía tu comprobante por WhatsApp al confirmar.</p>
                            </div>
                        </details>
                    </div>`;
                    cartItemsContainer.insertAdjacentHTML('beforeend', infoHTML);

                } else {
                    cartItemsContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-64 opacity-80">
                            <div class="w-20 h-20 bg-slate-800/50 rounded-full flex items-center justify-center mb-4 border border-white/5 shadow-[inset_0_0_15px_rgba(255,255,255,0.02)]">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-cyan-500/50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                            </div>
                            <p class="text-slate-200 font-bold text-lg">Tu pedido está vacío</p>
                            <p class="text-cyan-500/70 text-sm mt-1 font-medium">¡Agrega productos para continuar!</p>
                        </div>`;
                }

                cartTotal.textContent = `$${total.toFixed(2)}`;
                checkoutButton.disabled = !cartHasItems;
                checkoutButton.classList.toggle('opacity-50', !cartHasItems);
                checkoutButton.classList.toggle('cursor-not-allowed', !cartHasItems);

                if (cartHasItems) {
                    initClearCartBtn.classList.remove('invisible', 'opacity-0');
                } else {
                    initClearCartBtn.classList.add('invisible', 'opacity-0');
                }
            }

            function setCartQuantity(productId, quantity, categoryIdStr = null) {
                const product = findProductById(productId, true);
                if (!product) return;

                let newQuantity = Math.max(0, quantity);
                newQuantity = Math.round(newQuantity * 1000) / 1000;

                const currentQuantity = cart[productId] ? cart[productId].quantity : 0;

                if (newQuantity > 0) {
                    cart[productId] = { name: product.name, price: product.price, quantity: newQuantity };
                } else {
                    delete cart[productId];
                }

                if (newQuantity > currentQuantity) {
                    showToast(`¡Añadido al pedido!`);
                }

                updateCartUI();
                saveCartToStorage();

                updateCategoryBadge(categoryIdStr || findCategoryIdByProductId(productId));

                const card = document.querySelector(`[data-product-id="${productId}"]`)?.closest('.border-white\\/5, .border-cyan-500\\/30');
                if (card) {
                    if (newQuantity > 0) {
                        card.classList.add('bg-cyan-900/10', 'border-cyan-500/30');
                        card.classList.remove('bg-slate-800/40', 'border-white/5');
                    } else {
                        card.classList.remove('bg-cyan-900/10', 'border-cyan-500/30');
                        card.classList.add('bg-slate-800/40', 'border-white/5');
                    }
                }

                const mainQtyInput = document.getElementById(`qty-${productId}`);
                if (mainQtyInput && document.activeElement !== mainQtyInput) {
                    mainQtyInput.value = newQuantity > 0 ? newQuantity.toFixed(3).replace(/\.?0+$/, '') : '';
                }
                const mainMoneyInput = document.getElementById(`money-${productId}`);
                if (mainMoneyInput && document.activeElement !== mainMoneyInput) {
                    const amount = newQuantity * product.price;
                    mainMoneyInput.value = amount > 0 ? amount.toFixed(2) : '';
                }

                if (!cartModal.classList.contains('hidden')) renderCart();
            }

            function findCategoryIdByProductId(productId) {
                for (const category in productData) {
                    if (productData[category].some(p => p.id == productId)) {
                        return category.replace(/\s+/g, '-').toLowerCase();
                    }
                }
                return null;
            }

            function updateCategoryBadge(categoryId) {
                if (!categoryId) return;

                let catName = null;
                for (const category in productData) {
                    if (category.replace(/\s+/g, '-').toLowerCase() === categoryId) {
                        catName = category;
                        break;
                    }
                }
                if (!catName) return;

                const count = getCategoryItemsCount(catName);
                const badge = document.getElementById(`badge-${categoryId}`);
                if (badge) {
                    if (count > 0) {
                        badge.textContent = parseFloat(count.toFixed(3));
                        badge.classList.remove('hidden');
                        badge.classList.add('inline-block');
                        badge.classList.add('scale-125');
                        setTimeout(() => badge.classList.remove('scale-125'), 200);
                    } else {
                        badge.classList.add('hidden');
                        badge.classList.remove('inline-block');
                    }
                }
            }

            function updateCartUI() {
                let totalItems = 0;
                for (const productId in cart) {
                    totalItems += cart[productId].quantity;
                }
                const displayTotal = parseFloat(totalItems.toFixed(3));

                cartCountHeader.textContent = displayTotal;
                cartCountFloating.textContent = displayTotal;

                if (totalItems > 0) {
                    cartCountHeader.classList.remove('scale-0');
                    cartCountFloating.classList.remove('scale-0');
                    cartButtonFloating.classList.add('animate-bounce');
                    setTimeout(() => cartButtonFloating.classList.remove('animate-bounce'), 1000);
                } else {
                    cartCountHeader.classList.add('scale-0');
                    cartCountFloating.classList.add('scale-0');
                }
            }

            function showToast(message) {
                toastMessage.textContent = message;
                toast.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 2000);
            }

            function generateWhatsAppLink() {
                let message = `¡Hola *Productos DelFrio*! 👋\n\nSoy *${customerName}*, este es mi pedido:\n\n`;
                let total = 0;

                for (const productId in cart) {
                    const item = cart[productId];
                    const itemTotal = item.price * item.quantity;
                    const formattedQuantity = parseFloat(item.quantity.toFixed(3));
                    message += `▪️ *${formattedQuantity}* x ${item.name} - $${itemTotal.toFixed(2)}\n`;
                    total += itemTotal;
                }

                message += `\n💵 *Subtotal:* $${total.toFixed(2)}\n\n`;

                const deliveryMethod = document.querySelector('input[name="deliveryMethod"]:checked').value;

                if (deliveryMethod === 'domicilio') {
                    message += `🚚 *Método:* Envío a domicilio\n`;
                    message += `📍 _Por favor, indícame tu colonia para confirmar si aplica costo de envío (Zona Selene es gratis)._\n`;
                } else {
                    message += `🏬 *Método:* Pasaré a recogerlo al local\n`;
                    message += `_Avísame cuando mi pedido esté listo, por favor._\n`;
                }

                message += `\n¡Gracias!`;
                return `https://api.whatsapp.com/send?phone=${businessPhoneNumber}&text=${encodeURIComponent(message)}`;
            }

            function findProductById(productId, returnObject = false) {
                for (const category in productData) {
                    const product = productData[category].find(p => p.id == productId);
                    if (product) return returnObject ? product : product.name;
                }
                return null;
            }

            // --- Event Listeners ---

            loginButton.addEventListener('click', () => {
                customerName = customerNameInput.value.trim();
                if (customerName) {
                    localStorage.setItem('delfrio_user', customerName);
                    startApp();
                } else {
                    nameError.classList.remove('hidden');
                    customerNameInput.classList.add('border-rose-500', 'bg-rose-500/10');
                }
            });

            customerNameInput.addEventListener('input', () => {
                nameError.classList.add('hidden');
                customerNameInput.classList.remove('border-rose-500', 'bg-rose-500/10');
            });

            customerNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') loginButton.click();
            });

            const handleLogout = () => {
                localStorage.removeItem('delfrio_user');
                localStorage.removeItem('delfrio_cart');
                location.reload();
            };
            logoutButton.addEventListener('click', handleLogout);
            logoutButtonMobile.addEventListener('click', handleLogout);

            // Sincronizar ambas barras de búsqueda
            const handleSearch = (e) => {
                const term = e.target.value.toLowerCase().trim();

                if (e.target === searchInputDesktop) searchInputMobile.value = e.target.value;
                if (e.target === searchInputMobile) searchInputDesktop.value = e.target.value;

                if (!term) return renderProducts(productData);

                const filtered = {};
                for (const cat in productData) {
                    const matches = productData[cat].filter(p => p.name.toLowerCase().includes(term));
                    if (matches.length) filtered[cat] = matches;
                }
                renderProducts(filtered);
            };

            searchInputDesktop.addEventListener('input', handleSearch);
            searchInputMobile.addEventListener('input', handleSearch);

            const openCart = () => {
                const modalBox = cartModal.querySelector('.cart-modal-box');
                document.body.style.overflow = 'hidden';

                cartModal.classList.remove('hidden');
                cartModal.offsetWidth;
                cartModal.classList.remove('opacity-0');

                if (window.innerWidth < 640) {
                    modalBox.classList.remove('translate-y-full');
                } else {
                    modalBox.classList.remove('scale-95');
                }

                renderCart();

                checkoutButton.classList.remove('hidden');
                whatsappLinkButton.classList.add('hidden');
                cancelCheckoutButton.classList.add('hidden');
            };
            cartButtonHeader.addEventListener('click', openCart);
            cartButtonFloating.addEventListener('click', openCart);

            closeCartButton.addEventListener('click', () => {
                const modalBox = cartModal.querySelector('.cart-modal-box');
                cartModal.classList.add('opacity-0');

                if (window.innerWidth < 640) {
                    modalBox.classList.add('translate-y-full');
                } else {
                    modalBox.classList.add('scale-95');
                }

                document.body.style.overflow = '';

                setTimeout(() => cartModal.classList.add('hidden'), 300);
            });

            initClearCartBtn.addEventListener('click', () => {
                clearCartConfirmModal.classList.remove('hidden');
                clearCartConfirmModal.offsetWidth;
                clearCartConfirmModal.classList.remove('opacity-0');
                clearCartConfirmModal.querySelector('div').classList.remove('scale-95');
            });

            const closeClearModal = () => {
                clearCartConfirmModal.classList.add('opacity-0');
                clearCartConfirmModal.querySelector('div').classList.add('scale-95');
                setTimeout(() => clearCartConfirmModal.classList.add('hidden'), 300);
            }

            cancelClearBtn.addEventListener('click', closeClearModal);

            clearCartConfirmModal.addEventListener('click', (e) => {
                if (e.target === clearCartConfirmModal) closeClearModal();
            });

            confirmClearBtn.addEventListener('click', () => {
                cart = {};
                updateCartUI();
                saveCartToStorage();
                renderCart();
                renderProducts();
                closeClearModal();
                showToast("El carrito ha sido vaciado");
            });

            document.addEventListener('focusin', (e) => {
                if (e.target.classList.contains('select-all-on-click')) {
                    e.target.select();
                }
            });

            productListContainer.addEventListener('click', (e) => {
                const target = e.target;
                const quantityBtn = target.closest('.quantity-btn');
                const fractionBtn = target.closest('.fraction-btn');
                const header = target.closest('.accordion-header');

                const controlsDiv = target.closest('[data-product-id]');
                const catIdStr = controlsDiv ? controlsDiv.dataset.categoryId : null;

                if (quantityBtn) {
                    const id = quantityBtn.dataset.id;
                    const isIncrease = quantityBtn.dataset.action === 'increase';
                    const curr = cart[id] ? cart[id].quantity : 0;
                    setCartQuantity(id, curr + (isIncrease ? 1 : -1), catIdStr);
                } else if (fractionBtn) {
                    const id = fractionBtn.dataset.id;
                    const curr = cart[id] ? cart[id].quantity : 0;
                    setCartQuantity(id, curr + parseFloat(fractionBtn.dataset.amount), catIdStr);
                } else if (header) {
                    const content = document.querySelector(header.dataset.target);
                    const isOpen = content.classList.contains('open');

                    document.querySelectorAll('.accordion-content.open').forEach(el => {
                        el.classList.remove('open');
                        el.previousElementSibling.classList.remove('open');
                    });

                    if (!isOpen) {
                        content.classList.add('open');
                        header.classList.add('open');
                        setTimeout(() => header.scrollIntoView({ behavior: "smooth", block: "start" }), 200);
                    }
                }
            });

            productListContainer.addEventListener('input', (e) => {
                const target = e.target;
                const id = target.dataset.id;
                const price = parseFloat(target.dataset.price);
                if (!id || !price) return;

                const card = target.closest(`[data-product-id="${id}"]`);
                const catIdStr = card ? card.dataset.categoryId : null;
                let qty = 0;

                if (target.classList.contains('product-quantity-input')) {
                    if (target.value === '') {
                        qty = 0;
                        card.querySelector(`.product-money-input`).value = '';
                    } else {
                        qty = parseFloat(target.value) || 0;
                        if (document.activeElement === target) {
                            card.querySelector(`.product-money-input`).value = qty > 0 ? (qty * price).toFixed(2) : '';
                        }
                    }
                } else if (target.classList.contains('product-money-input')) {
                    if (target.value === '') {
                        qty = 0;
                        card.querySelector(`.product-quantity-input`).value = '';
                    } else {
                        const amt = parseFloat(target.value) || 0;
                        qty = amt / price;
                        if (document.activeElement === target) {
                            card.querySelector(`.product-quantity-input`).value = qty > 0 ? qty.toFixed(3).replace(/\.?0+$/, '') : '';
                        }
                    }
                }
                setCartQuantity(id, qty, catIdStr);
            });

            cartItemsContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('.cart-quantity-btn');
                if (btn) {
                    const id = btn.dataset.id;
                    const isInc = btn.dataset.action === 'increase-cart';
                    const curr = cart[id] ? cart[id].quantity : 0;
                    setCartQuantity(id, curr + (isInc ? 1 : -1));
                }
            });

            cartItemsContainer.addEventListener('input', (e) => {
                if (e.target.classList.contains('cart-quantity-input')) {
                    let qty = e.target.value === '' ? 0 : (parseFloat(e.target.value) || 0);
                    setCartQuantity(e.target.dataset.id, qty);
                }
            });

            checkoutButton.addEventListener('click', () => {
                whatsappLinkButton.href = generateWhatsAppLink();
                checkoutButton.classList.add('hidden');
                whatsappLinkButton.classList.remove('hidden');
                cancelCheckoutButton.classList.remove('hidden');
            });

            cancelCheckoutButton.addEventListener('click', () => {
                checkoutButton.classList.remove('hidden');
                whatsappLinkButton.classList.add('hidden');
                cancelCheckoutButton.classList.add('hidden');
            });

            whatsappLinkButton.addEventListener('click', () => {
                closeCartButton.click();

                setTimeout(() => {
                    cart = {};
                    updateCartUI();
                    saveCartToStorage();
                    renderProducts();
                    searchInputDesktop.value = '';
                    searchInputMobile.value = '';
                }, 1000);
            });

            // INICIAR
            loadSavedData();
        });
    </script>
</body>

</html>
